<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <link rel="stylesheet" href="estilos.css">
    <title>CRUD</title>
</head>

<body>
    <div class="container mt-5">
        <h1 class="mb-4 text-center">Inscripciones a algo</h1>
    </div>

    <!-- Formulario -->
    <div class="card">
        <div class="mb-3">
            <label for="nombrePersona" class="form-label">Nombre de la persona:</label>
            <input type="text" id="nombrePersona" class="form-control" placeholder="Tu nombre aquí">
        </div>
        <div class="mb-3">
            <label for="actividadSeleccionada" class="form-label">Actividad</label>
            <select id="actividadSeleccionada" class="form-select">
                <option value="">Selecciona una actividad</option>
                <option value="Robotica">Robótica</option>
                <option value="Ofimatica">Ofimática</option>
                <option value="DiseñoWeb">Diseño Web</option>
                <option value="Videojuegos">Videojuegos</option>
            </select>
        </div>
        <div class="mb-3">
            <label class="form-label">Turno</label>
            <div class="form-check">
                <input class="form-check-input" type="radio" id="turnoMañana" value="Mañana" name="turnoActividad">
                <label class="form-check-label" for="turnoMañana">Mañana</label>
            </div>
            <div class="form-check">
                <input class="form-check-input" type="radio" id="turnoTarde" value="Tarde" name="turnoActividad">
                <label class="form-check-label" for="turnoTarde">Tarde</label>
            </div>
        </div>
        <div class="mb-3">
            <button id="botonGuardar" class="btn btn-primary">Añadir inscripción</button>
        </div>
    </div>

    <!-- Tabla -->
    <div class="table-responsive">
        <table class="table table-striped table-bordered align-middle">
            <thead class="table-dark">
                <tr>
                    <th>Persona</th>
                    <th>Actividad</th>
                    <th>Turno</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody id="cuerpoTablaInscripciones">
            </tbody>
        </table>
    </div>


    <script src="app.js"></script>
</body>

</html>
