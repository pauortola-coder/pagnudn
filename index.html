<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="estilos.css">
    <title>Préstamos de material</title>
</head>

<body class="bg-light">
    <div class="container py-4" style="max-width: 800px;">
        <h1 class="text-center mb-4">Préstamos de material del aula</h1>

        <div class="card p-3 mb-4 shadow-sm">
            <div class="mb-3">
                <label for="nombreAlumno" class="form-label fw-bold">Nombre del alumno/a:</label>
                <input type="text" id="nombreAlumno" class="form-control" placeholder="Nombre">
            </div>

            <div class="mb-3">
                <label for="material" class="form-label fw-bold">Material:</label>
                <select id="material" class="form-select">
                    <option value="">Selecciona un material</option>
                    <option value="Cargador">Cargador</option>
                    <option value="Ratón">Ratón</option>
                    <option value="Portátil">Portátil</option>
                    <option value="Otros">Otros</option>
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label fw-bold d-block">Turno:</label>
                <div class="form-check">
                    <input class="form-check-input" type="radio" id="turnoMañana" value="Mañana" name="turno">
                    <label class="form-check-label" for="turnoMañana">Mañana</label>
                </div>
                <div class="form-check">
                    <input class="form-check-input" type="radio" id="turnoTarde" value="Tarde" name="turno">
                    <label class="form-check-label" for="turnoTarde">Tarde</label>
                </div>
            </div>

            <div class="form-check mb-3">
                <input class="form-check-input" type="checkbox" id="devuelto">
                <label class="form-check-label" for="devuelto">Devuelto</label>
            </div>

            <button id="botonGuardar" class="btn btn-primary">Añadir préstamo</button>
        </div>

        <table class="tabla-prestamos">
            <thead>
                <tr>
                    <th>Alumno/a</th>
                    <th>Material</th>
                    <th>Turno</th>
                    <th>Devuelto</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody id="cuerpoTabla"></tbody>
        </table>
        <p id="mensajeVacio" class="text-center text-muted fst-italic mt-3">No hay préstamos registrados</p>
    </div>

    <script src="app.js"></script>
</body>

</html>
